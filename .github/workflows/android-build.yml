name: Android APK Build

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Verify expo-av patch
        run: |
          VER=$(node -e "console.log(require('./node_modules/expo-av/package.json').version)")
          echo "expo-av version: $VER"
          if grep -q "resolveView" node_modules/expo-av/android/src/main/java/expo/modules/av/ViewUtils.kt 2>/dev/null; then
            echo "ERROR: ViewUtils.kt still has resolveView after patch"
            exit 1
          else
            echo "expo-av patch OK"
          fi

      - name: Expo Prebuild (Android)
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Replace debug.keystore with consistent signing key
        run: |
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > android/app/debug.keystore
          echo "Keystore installed ($(wc -c < android/app/debug.keystore) bytes)"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a \
            --stacktrace \
            --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
          NODE_ENV: production

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: musicstream-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            android/app/build/reports/
            android/app/build/outputs/logs/
          retention-days: 3
