name: Android APK Build

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies (runs patch-rntp.js postinstall)
        run: npm install --legacy-peer-deps

      - name: Verify RNTP patch was applied
        run: |
          if grep -q "buildscript" node_modules/react-native-track-player/android/build.gradle; then
            echo "ERROR: RNTP patch was NOT applied - buildscript block still present"
            cat node_modules/react-native-track-player/android/build.gradle
            exit 1
          else
            echo "RNTP patch verified: no buildscript block found"
          fi

      - name: Expo Prebuild (Android)
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Verify gradle.properties has JitPack
        run: |
          if grep -q "jitpack" android/gradle.properties 2>/dev/null; then
            echo "JitPack found in gradle.properties"
          else
            echo "WARNING: JitPack not in gradle.properties - adding manually"
            echo "" >> android/gradle.properties
            echo "android.extraMavenRepos=[{\"url\":\"https://www.jitpack.io\"}]" >> android/gradle.properties
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            --stacktrace \
            --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
          NODE_ENV: production

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: musicstream-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            android/app/build/reports/
            android/app/build/outputs/logs/
          retention-days: 3
