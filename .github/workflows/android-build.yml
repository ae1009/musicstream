name: Android APK Build

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Verify expo-av patch
        run: |
          VER=$(node -e "console.log(require('./node_modules/expo-av/package.json').version)")
          echo "expo-av version: $VER"
          if grep -q "resolveView" node_modules/expo-av/android/src/main/java/expo/modules/av/ViewUtils.kt 2>/dev/null; then
            echo "ERROR: ViewUtils.kt still has resolveView after patch"
            exit 1
          else
            echo "expo-av patch OK"
          fi

      - name: Expo Prebuild (Android)
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Install release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/musicstream-release.keystore
          echo "Keystore installed: $(wc -c < android/app/musicstream-release.keystore) bytes"

      - name: Add signing properties to gradle.properties
        run: |
          cat >> android/gradle.properties << EOF
          MYAPP_UPLOAD_STORE_FILE=musicstream-release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Patch build.gradle for release signing
        run: |
          python3 - << 'PYEOF'
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          if 'MYAPP_UPLOAD_STORE_FILE' in content:
              print("Already patched")
              exit(0)

          release_cfg = """        release {
                  if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                      storeFile file(MYAPP_UPLOAD_STORE_FILE)
                      storePassword MYAPP_UPLOAD_STORE_PASSWORD
                      keyAlias MYAPP_UPLOAD_KEY_ALIAS
                      keyPassword MYAPP_UPLOAD_KEY_PASSWORD
                  }
              }
          """

          # Insert release signing config into existing signingConfigs block (or create one)
          sc_pos = content.find('    signingConfigs {')
          if sc_pos >= 0:
              depth, sc_end = 0, -1
              for i in range(sc_pos, len(content)):
                  if content[i] == '{': depth += 1
                  elif content[i] == '}':
                      depth -= 1
                      if depth == 0:
                          sc_end = i
                          break
              content = content[:sc_end] + '    ' + release_cfg + content[sc_end:]
          else:
              content = content.replace(
                  '    buildTypes {',
                  '    signingConfigs {\n    ' + release_cfg + '    }\n    buildTypes {',
                  1
              )

          # Wire buildTypes.release to signingConfigs.release
          # Find buildTypes FIRST, then find release AFTER that position
          # (so we skip signingConfigs.release and target buildTypes.release)
          bt_pos = content.find('    buildTypes {')
          if bt_pos >= 0:
              rel_pos = content.find('        release {', bt_pos)
              if rel_pos >= 0:
                  depth, rel_end = 0, -1
                  for i in range(rel_pos, len(content)):
                      if content[i] == '{': depth += 1
                      elif content[i] == '}':
                          depth -= 1
                          if depth == 0:
                              rel_end = i
                              break
                  block = content[rel_pos:rel_end + 1]
                  if 'signingConfig signingConfigs.debug' in block:
                      block = block.replace(
                          'signingConfig signingConfigs.debug',
                          'signingConfig signingConfigs.release',
                          1
                      )
                  elif 'signingConfig signingConfigs.release' not in block:
                      ins = block.find('\n') + 1
                      block = (block[:ins] +
                               '            signingConfig signingConfigs.release\n' +
                               block[ins:])
                  content = content[:rel_pos] + block + content[rel_end + 1:]

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          print("build.gradle patched for release signing")
          PYEOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a \
            --stacktrace \
            --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
          NODE_ENV: production

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: musicstream-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            android/app/build/reports/
            android/app/build/outputs/logs/
          retention-days: 3
